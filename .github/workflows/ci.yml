name: CI

on:
  push:
    branches:
      - main
    paths:
      - "mobility-reliability-platform/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mobility-reliability-platform/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: mobility-reliability-platform

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Build platform bundles
        run: pnpm build

      - name: Run tests
        run: pnpm test
