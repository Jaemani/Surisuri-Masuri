name: CI

on:
  push:
    branches:
      - main
    paths:
      - "mobility-reliability-platform/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "mobility-reliability-platform/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobility-reliability-platform

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Set up Java for Firebase Emulator
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
          cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm check

      - name: Build platform bundles
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Test Firestore admission transactions
        run: >-
          pnpm --filter @mobility-reliability/firebase-rules exec firebase emulators:exec
          --config ../../firebase.json
          --project demo-mobility-reliability
          --only firestore
          "cd ../../services/telemetry-gateway && go test -mod=readonly -count=1 -race -timeout 60s ./internal/firebaseadapter -run FirestoreAdmissionStoreEmulator -v"

      - name: Check telemetry gateway
        working-directory: mobility-reliability-platform/services/telemetry-gateway
        run: |
          go mod tidy -diff
          go mod verify
          test -z "$(gofmt -l ./cmd ./internal)"
          go vet ./...
          go test -mod=readonly -count=1 -race ./...
          CGO_ENABLED=0 go build -mod=readonly -trimpath -o /tmp/telemetry-gateway ./cmd/server

      - name: Build telemetry container
        run: docker build -f services/telemetry-gateway/Dockerfile -t mobility-telemetry-gateway:ci .

      - name: Smoke test fail-closed telemetry container
        run: |
          docker run --rm --name mobility-telemetry-smoke -d -p 127.0.0.1:8085:8080 mobility-telemetry-gateway:ci
          trap 'docker rm -f mobility-telemetry-smoke >/dev/null 2>&1 || true' EXIT
          for attempt in 1 2 3 4 5; do
            if curl --max-time 5 --fail --silent http://127.0.0.1:8085/healthz >/dev/null; then
              break
            fi
            sleep 1
          done
          test "$(curl --max-time 5 --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8085/healthz)" = "200"
          test "$(curl --max-time 5 --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:8085/readyz)" = "503"
          test "$(curl --max-time 5 --silent --output /dev/null --write-out '%{http_code}' -X POST http://127.0.0.1:8085/v1/telemetry/batches)" = "503"
